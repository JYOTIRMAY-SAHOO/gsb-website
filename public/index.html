<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G.S.B Bricks & G.S.T Tiles</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
animation:fadein 0.8s;
}

@keyframes fadein{
from{opacity:0; transform:translateY(10px);}
to{opacity:1;}
}

header{
background:#b22222;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#333;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
}

.container{
padding:40px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

input,select,textarea{
padding:10px;
margin:5px;
width:220px;
}

button{
padding:10px 20px;
background:#b22222;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#8b1a1a;
}

.price-display{
font-weight:bold;
color:green;
margin-top:10px;
}

img{
width:100%;
max-width:300px;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h1>Gouri Shanker Bricks (G.S.B)</h1>
<p>Premium Fly Ash Bricks & Paver Blocks</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="contrater.html">Contractor</a>
<a href="adminlogin.html">Admin</a>
<a href="login.html">Customer Login</a>
</nav>

<div class="container">

<h2>Our Products</h2>

<div class="card">

<img src="brick.jpg">

<h3>Fly Ash Bricks</h3>

<p><strong>Price: ₹<span id="brickPrice"></span> per brick</strong></p>

</div>

<div class="card">

<img src="paver.jpg">

<h3>Paver Blocks</h3>

<p><strong>Price: ₹<span id="paverPrice"></span> per sq ft</strong></p>

</div>

<div class="card">

<h2>Place Order</h2>

<form id="orderForm">

<input type="text" id="name" placeholder="Name" required>

<input type="text" id="phone" placeholder="Phone" required>

<br><br>

<select id="product">
<option value="flyAsh9x5x3">Brick 9x5x3</option>
<option value="flyAsh10x5x3">Brick 10x5x3</option>
<option value="paver60mm">Paver Block 60mm</option>
<option value="paver80mm">Paver Block 80mm</option>
</select>

<input type="number" id="quantity" placeholder="Quantity" required>

<br><br>

<select id="serviceType" onchange="toggleDelivery()">

<option value="self">Self Service (Factory Pickup)</option>

<option value="delivery">Home Delivery</option>

</select>

<br><br>

<div id="deliveryBox" style="display:none;">

<textarea id="address" placeholder="Enter Delivery Address"></textarea>

</div>

<div id="unitInfo"></div>

<div class="price-display" id="totalPrice">
Total Price: ₹0
</div>

<img id="productImage">

<br><br>

<button type="submit">Submit Order</button>

</form>

</div>

</div>
<div class="card">

<h2>Tractor Load Calculator</h2>

<select id="tractorType">
<option value="small">Small Tractor</option>
<option value="medium">Medium Tractor</option>
<option value="big">Big Tractor</option>
</select>

<select id="brickType">
<option value="9">Brick 9x5x3</option>
<option value="10">Brick 10x5x3</option>
</select>

<br><br>

<button onclick="calculateLoad()">Calculate Load</button>

<h3 id="loadResult"></h3>

</div>
<footer style="background:#222;color:white;text-align:center;padding:20px">

Contact: +917978998570

</footer>

<script>

let prices={}

async function loadPrices(){

const res=await fetch("/api/prices")

prices=await res.json()

}

document.getElementById("quantity").addEventListener("input",calculateTotal)

document.getElementById("product").addEventListener("change",updateProduct)

function toggleDelivery(){

const type=document.getElementById("serviceType").value

const box=document.getElementById("deliveryBox")

if(type==="delivery"){

box.style.display="block"

document.getElementById("address").required=true

}else{

box.style.display="none"

document.getElementById("address").required=false

}

}

function updateProduct(){

const product=document.getElementById("product").value

if(prices[product]){

document.getElementById("unitInfo").innerText=

"Price: ₹"+prices[product].price+" "+prices[product].unit

}

const imageMap={

flyAsh9x5x3:"brick.jpg",

flyAsh10x5x3:"brick.jpg",

paver60mm:"paver.jpg",

paver80mm:"paver.jpg"

}

document.getElementById("productImage").src=imageMap[product]

calculateTotal()

}

function calculateTotal(){

const product=document.getElementById("product").value

const quantity=document.getElementById("quantity").value

if(prices[product]){

const total=prices[product].price*quantity

document.getElementById("totalPrice").innerText="Total Price: ₹"+total

}

}

document.getElementById("orderForm").addEventListener("submit",async function(e){

e.preventDefault()

const name=document.getElementById("name").value

const phone=document.getElementById("phone").value

const product=document.getElementById("product").value

const quantity=document.getElementById("quantity").value

const service=document.getElementById("serviceType").value

const address=document.getElementById("address").value

const total=prices[product].price*quantity

const token=localStorage.getItem("token")

await fetch("/api/order",{

method:"POST",

headers:{

"Content-Type":"application/json",

authorization:token

},

body:JSON.stringify({

name,

phone,

product,

quantity,

price:total,

service,

address

})

})

const message=

"🧱 *New Order - GSB* %0A%0A"+

"👤 Name: "+name+"%0A"+

"📞 Phone: "+phone+"%0A"+

"📦 Product: "+product+"%0A"+

"🔢 Quantity: "+quantity+"%0A"+

"🚚 Service: "+service+"%0A"+

"📍 Address: "+address+"%0A"+

"💰 Total: ₹"+total

const whatsapp="https://wa.me/917978998570?text="+message

window.open(whatsapp,"_blank")

alert("Order submitted!")

})

loadPrices()

updateProduct()

async function loadCardPrices(){

const res=await fetch("/api/prices")

const prices=await res.json()

document.getElementById("brickPrice").innerText=prices.flyAsh9x5x3.price

document.getElementById("paverPrice").innerText=prices.paver60mm.price

}

loadCardPrices()
function calculateLoad(){

const tractor=document.getElementById("tractorType").value
const brick=document.getElementById("brickType").value

let bricks=0

if(tractor==="small"){
bricks=(brick==="9")?800:700
}

if(tractor==="medium"){
bricks=(brick==="9")?1200:1000
}

if(tractor==="big"){
bricks=(brick==="9")?1600:1400
}

document.getElementById("loadResult").innerText=
"Estimated Capacity: "+bricks+" bricks"

}
</script>

</body>
</html>
